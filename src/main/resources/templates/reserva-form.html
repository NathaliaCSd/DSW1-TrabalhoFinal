<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{reservation.form.title} + ' | ' + #{app.title}">Reservar</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/responsive.css}" />
</head>
<body class="main-layout">
<div class="container reservation-page">
    <header class="text-center mb-4 reservation-title">
        <h1 th:text="#{reservation.form.title}">Reservar</h1>
        <p th:text="#{reservation.form.subtitle}"></p>
    </header>
    <div class="alert alert-danger" th:if="${erro != null}" th:text="${erro}"></div>
    <div class="reservation-card card shadow-sm">
        <div class="reservation-header">
            <h2 th:text="${casa.nome}"></h2>
            <p th:text="${casa.descricao}"></p>
        </div>
        <div class="card-body reservation-info">
            <div class="reservation-meta mb-4">
                <span><strong th:text="#{label.daily}"></strong> R$ <span th:text="${casa.diaria}"></span></span>
            </div>
            <form th:action="@{/reservas/salvar}" method="post" class="reservation-form">
                <input type="hidden" name="casaId" th:value="${casa.id}" />
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label th:text="#{label.arrival}"></label>
                        <input class="form-control" type="date" name="dataInicio" required />
                    </div>
                    <div class="form-group col-md-6">
                        <label th:text="#{label.departure}"></label>
                        <input class="form-control" type="date" name="dataFim" required />
                    </div>
                </div>
                <div class="reservation-actions">
                    <button class="btn btn-primary btn-lg" type="submit" th:text="#{button.reserve}">Reservar</button>
                    <a class="btn btn-outline-secondary btn-lg" th:href="@{/casas}" th:text="#{button.back}">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/jquery.min.js}"></script>
<script th:src="@{/js/bootstrap.min.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
