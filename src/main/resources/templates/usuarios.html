<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title th:text="#{users.title} + ' | ' + #{app.title}">Usuários</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>

<body>
    <div class="container mt-4">
        <header th:replace="~{fragments/header :: header}"></header>
 

        <div class="btn-group mb-3" role="group">
            <a class="btn btn-secondary" th:href="@{/}">[[#{topnav.home}]]</a>
            <a class="btn btn-danger" th:href="@{/usuario/logout}">[[#{button.logout}]]</a>
        </div>

        <div class="mb-3">
            <a class="btn btn-success" th:href="@{/usuario/novo}">[[#{button.new_user}]]</a>
        </div>

        <div class="alert alert-info" th:if="${usuarios == null or #lists.isEmpty(usuarios)}" th:text="#{no.users}">
        </div>

        <table class="table table-striped" th:if="${usuarios != null and !#lists.isEmpty(usuarios)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{user.form.name}">Nome</th>
                    <th th:text="#{user.form.login}">Login</th>
                    <th th:text="#{user.form.role}">Perfil</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nome}"></td>
                    <td th:text="${u.login}"></td>
                    <td th:text="${#strings.listJoin(u.papeis, ', ')}"></td>
                    <td>
                        <a class="btn btn-sm btn-secondary"
                            th:href="@{/usuario/edicao(id=${u.id})}">[[#{button.edit}]]</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/usuario/excluir(id=${u.id})}"
                            th:onclick="|return confirm('#{confirm.delete}');|">[[#{button.delete}]]</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
</body>

</html>
