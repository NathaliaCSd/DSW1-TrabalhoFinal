<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Erro | PetBnB</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container">
    <header>
        <h1>Ops! Algo deu errado</h1>
        <p>Ocorreu um problema ao processar sua solicitação.</p>
    </header>

    <div class="box">
        <p><strong>Status:</strong> <span th:text="${status}"></span></p>
        <p><strong>Erro:</strong> <span th:text="${error}"></span></p>
        <p><strong>Mensagem:</strong> <span th:text="${message}"></span></p>
        <p><strong>Caminho:</strong> <span th:text="${path}"></span></p>
    </div>

    <p><a class="button" th:href="@{/}">Voltar para a página inicial</a></p>
</div>
</body>
</html>
