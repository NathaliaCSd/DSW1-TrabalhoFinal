<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header">
    <div class="lang-selector text-end px-3 py-1" style="background:#f8f8f8; font-size:0.85rem;">
        <strong th:text="#{lang.select}">Idioma:</strong>
        <a th:href="@{?(lang=pt_BR)}" th:text="#{lang.portuguese}">Português</a> |
        <a th:href="@{?(lang=en)}" th:text="#{lang.english}">English</a>
    </div>
    <div class="container">
        <div class="row align-items-center py-2">
            <div class="col-md-3 logo_section">
                <div class="logo">
                    <a th:href="@{/}">
                        <img th:src="@{/images/supercao.png}" src="images/supercao.png" alt="PetBnB" />
                    </a>
                </div>
            </div>
            <div class="col-md-9">
                <div class="navigation">
                    <ul class="nav justify-content-end">

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}" th:text="#{topnav.home}">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/casas}" th:text="#{button.view_houses}">Ver casas</a>
                        </li>

                        <!-- visitante não logado -->
                        <li class="nav-item" th:if="${session.usuarioLogado == null}">
                            <a class="nav-link btn btn-primary text-white ms-2"
                               th:href="@{/usuario/login}" th:text="#{button.login}">Entrar</a>
                        </li>

                        <!-- ADMIN -->
                        <li class="nav-item"
                            th:if="${session.usuarioLogado != null and session.usuarioLogado.admin}">
                            <a class="nav-link" th:href="@{/usuario/lista}"
                               th:text="#{button.manage_users}">Usuários</a>
                        </li>

                        <!-- DONO_PET -->
                        <li class="nav-item"
                            th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDePet}">
                            <a class="nav-link" th:href="@{/pets}" th:text="#{button.view_pets}">Meus pets</a>
                        </li>
                        <li class="nav-item"
                            th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDePet and session.petLogado != null}">
                            <a class="nav-link" th:href="@{/reservas}"
                               th:text="#{button.my_reservations}">Reservas</a>
                        </li>
                        <li class="nav-item"
                            th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDePet and session.petLogado != null}">
                            <a class="nav-link text-warning" th:href="@{/pets/sair}"
                               th:text="#{button.logout_pet}">Sair do pet</a>
                        </li>

                        <!-- DONO_HOSPEDAGEM -->
                        <li class="nav-item"
                            th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDeHospedagem}">
                            <a class="nav-link" th:href="@{/casas/novo}"
                               th:text="#{button.add_house}">Adicionar Casa</a>
                        </li>

                        <!-- nome + sair -->
                        <li class="nav-item" th:if="${session.usuarioLogado != null}">
                            <span class="nav-link text-muted"
                                  th:text="#{topnav.hello(${session.usuarioLogado.nome})}">Olá</span>
                        </li>
                        <li class="nav-item" th:if="${session.usuarioLogado != null}">
                            <a class="nav-link btn btn-danger text-white ms-2"
                               th:href="@{/usuario/logout}" th:text="#{button.logout}">Sair</a>
                        </li>

                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>

</body>
</html>
