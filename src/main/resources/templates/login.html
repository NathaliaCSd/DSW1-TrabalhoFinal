<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{login.title} + ' | ' + #{app.title}">Login | PetBnB</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" href="css/style.css" />
    <link rel="stylesheet" th:href="@{/css/responsive.css}" href="css/responsive.css" />
</head>
<body>
<div class="container">
    <header>
    <!-- Barra de idioma -->
    <div class="lang-selector text-end px-3 py-1" style="background:#f8f8f8; font-size:0.85rem;">
        <strong th:text="#{lang.select}">Idioma:</strong>
        <a th:href="@{?(lang=pt_BR)}" th:text="#{lang.portuguese}">Português</a> |
        <a th:href="@{?(lang=en)}" th:text="#{lang.english}">English</a>
    </div>

    <div class="container">
        <div class="row align-items-center py-2">

            <!-- Logo -->
            <div class="col-md-3 logo_section">
                <div class="logo">
                    <a th:href="@{/}">
                        <img th:src="@{/images/supercao.png}" src="images/supercao.png" alt="PetBnB" />
                    </a>
                </div>
            </div>

            <!-- Navegação -->
            <div class="col-md-9">
                <div class="navigation">
                    <ul class="nav justify-content-end">

                        <!-- sempre visível -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}" th:text="#{topnav.home}">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/casas}" th:text="#{button.view_houses}">Ver casas</a>
                        </li>

                        <!-- visitante não logado -->
                        <li class="nav-item" th:if="${session.usuarioLogado == null}">
                            <a class="nav-link btn btn-primary text-white ms-2"
                               th:href="@{/usuario/login}" th:text="#{button.login}">Entrar</a>
                        </li>

                        <!-- ADMIN -->
                        <li class="nav-item" th:if="${session.usuarioLogado != null and session.usuarioLogado.admin}">
                            <a class="nav-link" th:href="@{/usuario/lista}" th:text="#{button.manage_users}">Usuários</a>
                        </li>

                        <!-- DONO_PET -->
                        <li class="nav-item" th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDePet}">
                            <a class="nav-link" th:href="@{/pets}" th:text="#{button.view_pets}">Meus pets</a>
                        </li>
                        <li class="nav-item" th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDePet and session.petLogado != null}">
                            <a class="nav-link" th:href="@{/reservas}" th:text="#{button.my_reservations}">Reservas</a>
                        </li>
                        <li class="nav-item" th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDePet and session.petLogado != null}">
                            <a class="nav-link text-warning" th:href="@{/pets/sair}" th:text="#{button.logout_pet}">Sair do pet</a>
                        </li>

                        <!-- DONO_HOSPEDAGEM -->
                        <li class="nav-item" th:if="${session.usuarioLogado != null and session.usuarioLogado.donoDeHospedagem}">
                            <a class="nav-link" th:href="@{/casas/novo}" th:text="#{button.add_house}">Adicionar Casa</a>
                        </li>

                        <!-- usuário logado: nome + sair -->
                        <li class="nav-item" th:if="${session.usuarioLogado != null}">
                            <span class="nav-link text-muted"
                                  th:text="#{topnav.hello(${session.usuarioLogado.nome})}">Olá</span>
                        </li>
                        <li class="nav-item" th:if="${session.usuarioLogado != null}">
                            <a class="nav-link btn btn-danger text-white ms-2"
                               th:href="@{/usuario/logout}" th:text="#{button.logout}">Sair</a>
                        </li>

                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>

 <!-- erro do Spring Security  -->
    <div class="alert alert-danger" th:if="${param.erro}" th:text="#{login.error}">
        Login ou senha incorretos.
    </div>
    <!-- mensagens passadas via model-->
    <div class="alert alert-success" th:if="${mensagem != null}" th:text="${mensagem}"></div>

    <form th:action="@{/usuario/login}" method="post" class="form">
        <div class="form-group mb-3">
            <label th:text="#{label.login}">Login</label>
            <input class="form-control" type="text" name="login" autofocus required />
        </div>
        <div class="form-group mb-3">
            <label th:text="#{label.password}">Senha</label>
            <input class="form-control" type="password" name="senha" required />
        </div>
        <button class="btn btn-primary w-100" type="submit" th:text="#{button.login}">Entrar</button>
    </form>
</div>

<script th:src="@{/js/jquery.min.js}" src="js/jquery.min.js"></script>
<script th:src="@{/js/bootstrap.min.js}" src="js/bootstrap.min.js"></script>
</body>
</html>
