<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{register.title} + ' | ' + #{app.title}">Registro</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/responsive.css}" />
</head>
<body>
<div class="container">
    <header>
        <h1 th:text="#{register.title}"></h1>
        <p th:text="#{register.subtitle}"></p>
    </header>

    <div class="alert alert-error" th:if="${erro != null}" th:text="${erro}"></div>

    <form th:action="@{/usuario/cadastro}" method="post" class="form">
        <div class="form-group">
            <label th:text="#{register.name}"></label>
            <input class="form-control" type="text" name="nome" required />
        </div>
        <div class="form-group">
            <label th:text="#{label.login}"></label>
            <input class="form-control" type="text" name="login" required />
        </div>
        <div class="form-group">
            <label th:text="#{register.password}"></label>
            <input class="form-control" type="password" name="senha" required />
        </div>
        <button class="btn btn-primary" type="submit" th:text="#{button.create_account}">Criar conta</button>
    </form>
    <p class="center" th:utext="#{register.already_account} + ' ' + '<a href="' + @{/usuario/login} + '">' + #{button.login} + '</a>'"></p>
</div>
</body>
</html>
